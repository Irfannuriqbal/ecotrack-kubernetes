# Sensitive credentials stored separately from ConfigMap data.
apiVersion: v1
kind: Secret
metadata:
  name: ecotrack-secret
  namespace: ecotrack
  labels:
    app.kubernetes.io/name: ecotrack
    app.kubernetes.io/component: secret
    app.kubernetes.io/part-of: ecotrack
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: rootpassword
  MYSQL_DATABASE: ecotrack
  MYSQL_USER: ecotrack_user
  MYSQL_PASSWORD: ecotrack_password
  DB_USER: ecotrack_user
  DB_PASSWORD: ecotrack_password
