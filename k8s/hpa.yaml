# HPA keeps backend pods between 2 and 5 replicas based on CPU usage.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ecotrack-backend-hpa
  namespace: ecotrack
  labels:
    app.kubernetes.io/name: ecotrack
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: ecotrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ecotrack-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
