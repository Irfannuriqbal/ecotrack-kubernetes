# ClusterIP service that exposes the API inside the cluster.
apiVersion: v1
kind: Service
metadata:
  name: ecotrack-backend
  namespace: ecotrack
  labels:
    app.kubernetes.io/name: ecotrack
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: ecotrack
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ecotrack
    app.kubernetes.io/component: backend
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
      name: http
