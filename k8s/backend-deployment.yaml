# Backend deployment with two replicas for high availability.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecotrack-backend
  namespace: ecotrack
  labels:
    app.kubernetes.io/name: ecotrack
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: ecotrack
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ecotrack
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ecotrack
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: ecotrack
    spec:
      containers:
        - name: backend
          image: ecotrack-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: ecotrack-config
            - secretRef:
                name: ecotrack-secret
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: ecotrack-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: ecotrack-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: ecotrack-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ecotrack-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecotrack-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
