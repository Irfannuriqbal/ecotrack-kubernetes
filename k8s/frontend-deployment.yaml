# Frontend deployment serving the React build through Nginx.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecotrack-frontend
  namespace: ecotrack
  labels:
    app.kubernetes.io/name: ecotrack
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: ecotrack
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ecotrack
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ecotrack
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: ecotrack
    spec:
      containers:
        - name: frontend
          image: ecotrack-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: ecotrack-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
