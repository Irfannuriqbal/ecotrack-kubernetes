# Local development stack for EcoTrack.
services:
  mysql:
    image: mysql:8.4
    container_name: ecotrack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ecotrack
      MYSQL_USER: ecotrack_user
      MYSQL_PASSWORD: ecotrack_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql:ro
      - ./backend/sql/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ecotrack-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ecotrack_user
      DB_PASSWORD: ecotrack_password
      DB_NAME: ecotrack
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    container_name: ecotrack-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

# Persistent MySQL data for local Docker runs.
volumes:
  mysql_data:
